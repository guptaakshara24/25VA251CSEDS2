<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Grid Timetable</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>

    .box{
      border: 1px solid white;
      padding: 20px;
      text-align: center;
      font-weight: bold;
    }

  </style>
</head>

<body class="bg-light">

  <div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
      College Timetable
    </h1>

    <div class="row">

      <div class="col bg-dark text-white box">
        Day/Time
      </div>

      <div class="col bg-dark text-white box">
        9-10
      </div>

      <div class="col bg-dark text-white box">
        10-11
      </div>

      <div class="col bg-dark text-white box">
        11-12
      </div>

      <div class="col bg-dark text-white box">
        12-1
      </div>

      <div class="col bg-dark text-white box">
        1-2
      </div>

    </div>

    <div class="row">

      <div class="col bg-primary text-white box">
        Monday
      </div>

      <div class="col bg-success box">
        Maths
      </div>

      <div class="col bg-warning box">
        Physics
      </div>

      <div class="col bg-info box">
        C++
      </div>

      <div class="col bg-danger text-white box">
        Break
      </div>

      <div class="col bg-secondary text-white box">
        DSA
      </div>

    </div>

    <div class="row">

      <div class="col bg-primary text-white box">
        Tuesday
      </div>

      <div class="col bg-info box">
        DBMS
      </div>

      <div class="col bg-success box">
        Maths
      </div>

      <div class="col bg-warning box">
        Chemistry
      </div>

      <div class="col bg-danger text-white box">
        Break
      </div>

      <div class="col bg-secondary text-white box">
        Python
      </div>

    </div>

    <div class="row">

      <div class="col bg-primary text-white box">
        Wednesday
      </div>

      <div class="col bg-secondary text-white box">
        DSA
      </div>

      <div class="col bg-info box">
        Web Dev
      </div>

      <div class="col bg-success box">
        Maths
      </div>

      <div class="col bg-danger text-white box">
        Break
      </div>

      <div class="col bg-warning box">
        Physics
      </div>

    </div>

    <div class="row">

      <div class="col bg-primary text-white box">
        Thursday
      </div>

      <div class="col bg-warning box">
        Chemistry
      </div>

      <div class="col bg-success box">
        English
      </div>

      <div class="col bg-secondary text-white box">
        DSA
      </div>

      <div class="col bg-danger text-white box">
        Break
      </div>

      <div class="col bg-info box">
        Python
      </div>

    </div>

    <div class="row">

      <div class="col bg-primary text-white box">
        Friday
      </div>

      <div class="col bg-info box">
        Web Dev
      </div>

      <div class="col bg-warning box">
        Physics
      </div>

      <div class="col bg-success box">
        Maths
      </div>

      <div class="col bg-danger text-white box">
        Break
      </div>

      <div class="col bg-secondary text-white box">
        Project
      </div>

    </div>

  </div>

</body>
</html>
