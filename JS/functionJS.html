<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        // function without parameter
         function demo(){
            console.log("hello JS");
        }
        demo();

        // function with parameter
        function demo1(text){
            console.log("hello "+ text);
        }
        demo1("JS");

        // function with default parameters
        function add(a,b=10){
            console.log("addition of two number is "+ (a+b));
        }
        add(3);

        // anonymous function
        let cal=function(){
            var num1=5;
            var num2=10;
            var res=num1*num2;
            console.log("multiply of num1 and num2 "+ res );
        }
        cal();

        // arrow function
        let div=(x,y)=>{
            var num1=x;
            var num2=y;
            var res=x/y;
            console.log("division is "+ res);
        }
        div(12,3);

        // arrow function with single line statement
        let msg=()=>console.log("Hello ABES");
        msg();

        // call back function
        function sub(a, b, callback){
            var num1 = a;
            var num2 = b;
            var res = num1 - num2;
            callback(res);
        }

        function displayres(res){
            console.log("result is " + res);
        }
        sub(10, 5, displayres);

        //LIFE
        (function(a,b){
            console.log(`first parameter ${a} and second parameter ${b}`);
            var res = a + b;
            console.log(`result is ${res}`);
        })(4,5);


        //promises
        let promise=new Promise(function(resolve, reject){
            let age=25;
            if(age>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year")
            }
        });
       // console.log(promise); 
       promise.then(msg=>console.log(msg))
       .catch(error=>console.log(error));


       //async await..........
       async function userData() {
            let response=await fetch('https://dummyjson.com/products');
            let responseData=await response.json();
            console.log(responseData);
       }
       userData();

       //local storage
       let myInfo={
        name:"John",
        age:23,
        mob:0899786754,
        email:"john234@gamil.com"
       }
       //convert the object into JSON string
       let myInfoData=JSON.stringify(myInfo);

        //set data
        localStorage.setItem('preference' , myInfoData);
        let getMyInfoloData=localStorage.getItem('preference');
        //parse 
        const finalData=JSON.parse(getMyInfoloData);
        console.log(finalData.name);


        let num=[3,5,6,7,8,9,2,3,6,8,0];

        let result=num.map(n=>n*n);
        console.log(`square of num is $(result)`);
        
        let result2=num.filter(n=>n>3);
        console.log(`sorting of num array is $(result2)`);

        let sum=num.reduce((total,n)=>total+n);
        console.log(`addition of num array elements is $(sum)`);

        let double=num.forEach(n=>console.log())
    </script>
</body>
