<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS</title>
</head>
<body>
    <script>
        //for loop
        let studentlist=["vikas", "vinay", "vivek", "sneha", "Deepak", "shiva"];
        for(let i=0;i<studentlist.length;i++){
            console.log(studentlist[i]);

        }

        //while loop
        let x=0;
        while(x<studentlist.length){
            console.log(studentlist[x]);
            x++;
        }

        //for....of loop
        for(let y of studentlist){
            console.log(y);
        }

        let myinfo=["akshara", "18", "cse ds2", "computer engineer", "abes gzb"];
        for(let i=0;i<myinfo.length;i++){
            console.log(myinfo[i]);
        }
        
    </script>
</body>
</html>
